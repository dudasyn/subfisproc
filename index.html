<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS - Sistema de Gestão SUBFIS</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Libraries for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <!-- CSS Design System -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    
    <div id="toast-container"></div>
    <div id="app-container"></div>

    <!-- TEMPLATE: LOGIN -->
    <template id="tpl-login">
        <div class="login-wrapper">
            <div class="login-glass-card">
                <div class="login-header">
                    <div class="logo-icon"><i class="fa-solid fa-scale-balanced"></i></div>
                    <h2>SUBFIS Gestão</h2>
                    <p>Faça login para continuar</p>
                </div>
                <form id="login-form">
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="login-email" placeholder="CPF ou E-mail" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Senha" required>
                    </div>
                    <button type="submit" class="btn-primary" id="btn-login">
                        <span>Entrar</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                    <div id="login-error" class="error-msg"></div>
                </form>
            </div>
            <div class="bg-shape shape-1"></div>
            <div class="bg-shape shape-2"></div>
            <div class="bg-shape shape-3"></div>
        </div>
    </template>

    <!-- TEMPLATE: MAIN APP -->
    <template id="tpl-main">
        <div class="app-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="logo-icon"><i class="fa-solid fa-scale-balanced"></i></div>
                    <h2>SUBFIS</h2>
                </div>
                <nav class="sidebar-nav">
                    <a href="#dashboard" class="nav-item active" data-view="dashboard">
                        <i class="fa-solid fa-chart-pie"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="#movements" class="nav-item" data-view="movements">
                        <i class="fa-solid fa-arrow-right-arrow-left"></i>
                        <span>Nova Movimentação</span>
                    </a>
                    <a href="#search" class="nav-item" data-view="search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <span>Buscar Processo</span>
                    </a>
                    <a href="#reports" class="nav-item" data-view="reports">
                        <i class="fa-solid fa-file-lines"></i>
                        <span>Relatórios</span>
                    </a>
                    <a href="#config" class="nav-item" data-view="config">
                        <i class="fa-solid fa-gear"></i>
                        <span>Configurações</span>
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-info">
                        <div class="avatar"><i class="fa-regular fa-user"></i></div>
                        <div class="details">
                            <span class="user-name" id="ui-user-name">Usuário</span>
                            <span class="user-role" id="ui-user-role">Role</span>
                        </div>
                    </div>
                    <button id="btn-logout" class="btn-logout" title="Sair"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                <header class="top-header">
                    <h1 id="page-title">Bem-vindo</h1>
                    <div class="header-actions">
                        <span class="date-display" id="current-date"></span>
                    </div>
                </header>
                <div class="content-scroll" id="view-container">
                    <!-- Views will be injected here -->
                </div>
            </main>
        </div>
    </template>

    <!-- Scripts -->
    <script src="js/api.js?v=1.1"></script>
    <script src="js/views/dashboard.js?v=1.1"></script>
    <script src="js/views/movements.js?v=1.1"></script>
    <script src="js/views/search.js?v=1.1"></script>
    <script src="js/views/reports.js?v=1.1"></script>
    <script src="js/views/config.js?v=1.1"></script>
    <script src="js/app.js?v=1.1"></script>
</body>
</html>
