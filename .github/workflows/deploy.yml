name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./ # Ajuste se precisar subir em uma subpasta específica
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          .github/**
          brain/**
          SETUP_DEV.md
          README.md
          *.sql
          api/config.php
          debug_db.php
          test_password.php
          gen_hash.php
          update_db_pass.php
          verify_fix.php
