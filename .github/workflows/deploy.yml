name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./ # Ajuste se precisar subir em uma subpasta específica
        state-name: none # Evita erros 550 ao não usar arquivo de estado
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          .github/**
          .env
          .env.example
          brain/**
          scratch/**
          SETUP_DEV.md
          README.md
          *.sql
          api/config.php
          debug_db.php
          test_password.php
          gen_hash.php
          update_db_pass.php
          verify_fix.php
