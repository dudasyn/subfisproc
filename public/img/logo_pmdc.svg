<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
  <!-- Definition for reusable styles and gradients -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0072bc" />
      <stop offset="100%" stop-color="#004aad" />
    </linearGradient>
  </defs>

  <!-- 1. Left Icon: Rounded Crest Frame -->
  <g id="crest-icon">
    <!-- Double-bordered Rounded Square -->
    <rect x="10" y="10" width="100" height="100" rx="22" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.9" />
    <rect x="15" y="15" width="90" height="90" rx="18" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4" />

    <!-- Municipal Crown / Castle Top -->
    <path d="M 45,42 L 45,34 L 51,34 L 51,37 L 55,37 L 55,34 L 61,34 L 61,37 L 65,37 L 65,34 L 71,34 L 71,37 L 75,37 L 75,34 L 81,34 L 81,42 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
    
    <!-- Shield Outline -->
    <path d="M 47,44 L 79,44 L 79,64 C 79,74 63,82 63,82 C 63,82 47,74 47,64 Z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round" />
    
    <!-- Three Stars in Shield Top -->
    <g transform="translate(0, -1)" fill="currentColor" opacity="0.9">
      <!-- Star 1 -->
      <polygon points="56,50 57.5,52.5 60,52.5 58,54 59,56.5 56,55 53,56.5 54,54 52,52.5 54.5,52.5" />
      <!-- Star 2 (Center) -->
      <polygon points="63,48 64.5,50.5 67,50.5 65,52 66,54.5 63,53 60,54.5 61,52 59,50.5 61.5,50.5" />
      <!-- Star 3 -->
      <polygon points="70,50 71.5,52.5 74,52.5 72,54 73,56.5 70,55 67,56.5 68,54 66,52.5 68.5,52.5" />
    </g>

    <!-- Shield Inner Charges (Mountain/Valley Paths) -->
    <path d="M 53,70 Q 63,74 73,70 M 50,62 Q 63,68 76,62" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />

    <!-- Ribbon / Scroll Banner at Bottom -->
    <path d="M 41,84 Q 63,89 85,84 L 82,88 Q 63,93 44,88 Z" fill="currentColor" opacity="0.8" />
    <path d="M 38,82 L 44,88 M 88,82 L 82,88" stroke="currentColor" stroke-width="1.5" />
  </g>

  <!-- 2. Right Icon: Official Typography -->
  <g id="typography" fill="currentColor" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif">
    <!-- DUQUE -->
    <text x="135" y="44" font-size="34" font-weight="800" letter-spacing="4.5">DUQUE</text>
    <!-- DE CAXIAS -->
    <text x="135" y="76" font-size="34" font-weight="800" letter-spacing="4.5">DE CAXIAS</text>
    <!-- PREFEITURA -->
    <text x="135" y="100" font-size="18" font-weight="400" letter-spacing="7.5" opacity="0.85">PREFEITURA</text>
  </g>
</svg>
