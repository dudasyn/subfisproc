<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS - Sistema de Gestão SUBFIS</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Libraries for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- CSS Design System -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    
    <div id="toast-container"></div>
    <div id="app-container"></div>

    <!-- TEMPLATE: LOGIN -->
    <template id="tpl-login">
        <div class="login-wrapper">
            <div class="login-glass-card" style="padding: 3rem; overflow: hidden; width: 100%; max-width: 440px;">
                <!-- Premium Header Band in Official Municipal Blue containing the Logonova image -->
                <div class="login-header-premium" style="background: linear-gradient(135deg, #0072bc, #004aad); margin: -3rem -3rem 2rem -3rem; padding: 2.5rem 2rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <div style="width: 210px; height: auto; margin: 0 auto 0.75rem auto;">
                        <img src="img/logonova.png" alt="Prefeitura de Duque de Caxias" style="width: 100%; height: auto; display: block;">
                    </div>
                    <h2 style="font-size: 1.5rem; font-weight: 800; color: #ffffff; margin: 0.5rem 0 0 0; letter-spacing: 0.5px;">SGS - SUBFIS</h2>
                    <p style="color: rgba(255,255,255,0.85); font-size: 0.85rem; margin-top: 0.25rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;">Gestão de Tramitações</p>
                </div>
                <form id="login-form">
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="login-email" placeholder="CPF ou E-mail" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Senha" required>
                    </div>
                    <button type="submit" class="btn-primary" id="btn-login">
                        <span>Entrar</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                    <div id="login-error" class="error-msg"></div>
                </form>
            </div>
            <div class="bg-shape shape-1"></div>
            <div class="bg-shape shape-2"></div>
            <div class="bg-shape shape-3"></div>
        </div>
    </template>

    <!-- TEMPLATE: MAIN APP -->
    <template id="tpl-main">
        <div class="app-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header" style="display: flex; align-items: center; justify-content: center; padding: 1.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); flex-direction: column; gap: 0.75rem;">
                    <!-- Beautiful Official Municipal Logo Image -->
                    <div style="width: 190px; height: auto;">
                        <img src="img/logonova.png" alt="Prefeitura de Duque de Caxias" style="width: 100%; height: auto; display: block;">
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                        <span style="font-size: 1rem; font-weight: 800; color: #ffffff; letter-spacing: 0.5px;">SGS - SUBFIS</span>
                    </div>
                </div>
                <nav class="sidebar-nav" style="margin-top: 1rem;">
                    <a href="#dashboard" class="nav-item active" data-view="dashboard">
                        <i class="fa-solid fa-chart-pie"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="#search" class="nav-item" data-view="search">
                        <i class="fa-solid fa-list-check"></i>
                        <span>Listar Processos</span>
                    </a>
                    <a href="#reports" class="nav-item" data-view="reports">
                        <i class="fa-solid fa-file-lines"></i>
                        <span>Relatórios</span>
                    </a>
                    <a href="#config" class="nav-item" data-view="config">
                        <i class="fa-solid fa-gear"></i>
                        <span>Configurações</span>
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-info">
                        <div class="avatar"><i class="fa-regular fa-user"></i></div>
                        <div class="details">
                            <span class="user-name" id="ui-user-name">Usuário</span>
                            <span class="user-role" id="ui-user-role">Role</span>
                        </div>
                    </div>
                    <button id="btn-logout" class="btn-logout" title="Sair"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                <header class="top-header">
                    <h1 id="page-title">Bem-vindo</h1>
                    <div class="header-actions">
                        <span class="date-display" id="current-date"></span>
                    </div>
                </header>
                <div class="content-scroll" id="view-container">
                    <!-- Views will be injected here -->
                </div>
            </main>
            
            <!-- GLOBAL COMPONENT: Auditor Drawer -->
            <div id="auditor-drawer" style="
                position: fixed; top: 0; right: -540px; width: 540px; height: 100vh;
                background-color: #ffffff;
                box-shadow: -6px 0 32px rgba(0,0,0,0.18);
                z-index: 9999; display: flex; flex-direction: column;
                transition: right 0.35s cubic-bezier(.4,0,.2,1);
                border-left: 1px solid var(--border-color);
            ">
                <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); background: #ffffff; display:flex; flex-direction:column; gap:0.75rem; flex-shrink:0;">
                    <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                        <div>
                            <h3 id="drawer-title" style="margin:0; font-size: 1.2rem; font-weight: 750; color: var(--accent); display: flex; align-items: center; gap: 8px;">
                                <i class="fa-solid fa-user-tie" style="color: var(--primary);"></i> Processos do Auditor
                            </h3>
                            <p id="drawer-subtitle" style="margin:0.25rem 0 0; font-size:0.85rem; color:var(--text-secondary); font-weight: 500;"></p>
                        </div>
                        <button onclick="window.app.closeAuditorDrawer()" style="background:rgba(0,0,0,0.03); border:none; cursor:pointer; font-size:1.1rem; color:var(--text-secondary); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition: var(--transition);">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                    <!-- Export Actions for Drawer -->
                    <div id="drawer-export-actions" style="display: none; gap: 8px; border-top: 1px solid #f1f5f9; padding-top: 0.75rem;">
                        <button class="btn-secondary" id="btn-drawer-xlsx" style="width:auto;" onclick="window.app.exportDrawerXLSX()">
                            <i class="fa-solid fa-file-excel"></i> Exportar XLSX
                        </button>
                        <button class="btn-secondary" id="btn-drawer-pdf" style="width:auto;" onclick="window.app.exportDrawerPDF()">
                            <i class="fa-solid fa-file-pdf"></i> Exportar PDF
                        </button>
                    </div>
                </div>
                <div id="drawer-body" style="flex:1; overflow-y:auto; padding: 1.5rem; background: #fafbfc;">
                    <div class="text-center p-4"><i class="fa-solid fa-spinner fa-spin"></i></div>
                </div>
            </div>
            <div id="drawer-backdrop" onclick="window.app.closeAuditorDrawer()" style="
                display:none; position:fixed; inset:0; background:rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index:9998;
            "></div>
        </div>
    </template>

    <!-- Scripts -->
    <script src="js/api.js?v=3.7"></script>
    <script src="js/views/dashboard.js?v=3.7"></script>
    <script src="js/views/movements.js?v=3.7"></script>
    <script src="js/views/search.js?v=3.7"></script>
    <script src="js/views/reports.js?v=3.7"></script>
    <script src="js/views/config.js?v=3.7"></script>
    <script src="js/app.js?v=3.7"></script>
</body>
</html>
