version: '3.8'

services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Sao_Paulo
    depends_on:
      - app

  app:
    build:
      context: ./docker/php
    volumes:
      - ./:/var/www/html
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=subfisproc
      - TZ=America/Sao_Paulo
    depends_on:
      - db

  db:
    image: mariadb:10.6
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=subfisproc
      - TZ=America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro

volumes:
  db_data:
